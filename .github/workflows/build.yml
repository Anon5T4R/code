name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm LSP packages (offline)
        shell: pwsh
        run: |
          cd src-tauri\lsp-packages
          npm install --ignore-scripts

      - name: Setup Go (for gopls)
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Download rust-analyzer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "src-tauri\lsp-packages\bin" -Force
          $url = "https://github.com/rust-lang/rust-analyzer/releases/latest/download/rust-analyzer-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\rust-analyzer.zip"
          Expand-Archive -Path "$env:TEMP\rust-analyzer.zip" -DestinationPath "src-tauri\lsp-packages\bin" -Force

      - name: Install gopls
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "src-tauri\lsp-packages\bin" -Force
          go install golang.org/x/tools/gopls@latest
          Copy-Item "$env:USERPROFILE\go\bin\gopls.exe" "src-tauri\lsp-packages\bin\gopls.exe"

      - name: Install pylsp (bundled Python embeddable)
        shell: pwsh
        run: |
          $pyVer = "3.12.9"
          $url = "https://www.python.org/ftp/python/$pyVer/python-$pyVer-embed-amd64.zip"
          $dest = "src-tauri\lsp-packages\python"
          New-Item -ItemType Directory -Path $dest -Force
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\python.zip"
          Expand-Archive -Path "$env:TEMP\python.zip" -DestinationPath $dest -Force
          # Enable site-packages in ._pth
          $pth = Get-ChildItem $dest -Filter "*._pth" | Select-Object -First 1
          if ($pth) {
            (Get-Content $pth.FullName) -replace '#import site', 'import site' | Set-Content $pth.FullName
          }
          # Install pip + pylsp
          Invoke-WebRequest -Uri "https://bootstrap.pypa.io/get-pip.py" -OutFile "$env:TEMP\get-pip.py"
          & "$dest\python.exe" "$env:TEMP\get-pip.py" --no-warn-script-location 2>&1 | Out-Null
          & "$dest\python.exe" -m pip install python-lsp-server -q 2>&1 | Out-Null
          # Cleanup pip cache to save space
          & "$dest\python.exe" -m pip cache purge -q 2>&1 | Out-Null
          Remove-Item -Recurse -Force "$dest\Lib\site-packages\pip" -ErrorAction SilentlyContinue

      - name: Download Dart SDK
        shell: pwsh
        run: |
          $url = "https://storage.googleapis.com/dart-archive/channels/stable/release/latest/sdk/dartsdk-windows-x64-release.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\dart-sdk.zip"
          Expand-Archive -Path "$env:TEMP\dart-sdk.zip" -DestinationPath "src-tauri\lsp-packages" -Force

      - name: Download llama-server
        shell: pwsh
        run: |
          $url = "https://github.com/ggml-org/llama.cpp/releases/download/b9802/llama-b9802-bin-win-cpu-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\llama.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $a = [System.IO.Compression.ZipFile]::OpenRead("$env:TEMP\llama.zip")
          New-Item -ItemType Directory -Path "src-tauri\binaries\llama" -Force
          foreach ($e in $a.Entries) { if ($e.Name) { [System.IO.Compression.ZipFileExtensions]::ExtractToFile($e, "src-tauri\binaries\llama\$($e.Name)", $true) } }
          $a.Dispose()

      - name: Build
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LocalCode-Windows
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/LocalCode*
            !**/*.d
            !**/*.pdb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LocalCode ${{ github.ref_name }}
          body: "Build automático do ${{ github.ref_name }}."
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-linux:
    runs-on: ubuntu-22.04
    needs: build-windows

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file \
            wget \
            libfuse2

      - name: Install npm LSP packages (offline)
        run: |
          cd src-tauri/lsp-packages
          npm install --ignore-scripts

      - name: Setup Go (for gopls)
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Download rust-analyzer (Linux)
        run: |
          mkdir -p src-tauri/lsp-packages/bin
          wget -qO ra.gz https://github.com/rust-lang/rust-analyzer/releases/latest/download/rust-analyzer-x86_64-unknown-linux-gnu.gz
          gunzip -c ra.gz > src-tauri/lsp-packages/bin/rust-analyzer
          chmod +x src-tauri/lsp-packages/bin/rust-analyzer

      - name: Install gopls (Linux)
        run: |
          go install golang.org/x/tools/gopls@latest
          cp "$(go env GOPATH)/bin/gopls" src-tauri/lsp-packages/bin/gopls
          chmod +x src-tauri/lsp-packages/bin/gopls

      - name: Download Dart SDK (Linux)
        run: |
          wget -qO dart.zip https://storage.googleapis.com/dart-archive/channels/stable/release/latest/sdk/dartsdk-linux-x64-release.zip
          unzip -q dart.zip -d src-tauri/lsp-packages
          chmod +x src-tauri/lsp-packages/dart-sdk/bin/dart || true

      - name: Download llama-server (Linux)
        run: |
          wget -qO llama.tar.gz https://github.com/ggml-org/llama.cpp/releases/download/b9802/llama-b9802-bin-ubuntu-x64.tar.gz
          mkdir -p src-tauri/binaries/llama llama-extract
          tar -xzf llama.tar.gz -C llama-extract
          # Flatten llama-server + its shared libraries into binaries/llama
          find llama-extract -type f \( -name 'llama-server' -o -name '*.so' -o -name '*.so.*' \) -exec cp {} src-tauri/binaries/llama/ \;
          chmod +x src-tauri/binaries/llama/llama-server

      - name: Build AppImage
        run: npm run tauri build -- --bundles appimage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LocalCode-Linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LocalCode ${{ github.ref_name }}
          body: "Build automático do ${{ github.ref_name }}."
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
