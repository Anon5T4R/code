name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download llama-server
        shell: pwsh
        run: |
          $url = "https://github.com/ggml-org/llama.cpp/releases/download/b9802/llama-b9802-bin-win-cpu-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\llama.zip"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $a = [System.IO.Compression.ZipFile]::OpenRead("$env:TEMP\llama.zip")
          New-Item -ItemType Directory -Path "src-tauri\binaries\llama" -Force
          foreach ($e in $a.Entries) { if ($e.Name) { [System.IO.Compression.ZipFileExtensions]::ExtractToFile($e, "src-tauri\binaries\llama\$($e.Name)", $true) } }
          $a.Dispose()

      - name: Build
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LocalCode-Windows
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/release/LocalCode*
            !**/*.d
            !**/*.pdb

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: LocalCode ${{ github.ref_name }}
          body: "Build automático do ${{ github.ref_name }}."
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
